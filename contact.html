<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact GuppyKerala for inquiries and orders">
    <title>Contact Us | GuppyKerala</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="header"></div>
    <section class="fade-in" style="padding-top: 150px; min-height: 80vh;">
        <div class="container">
            <h1 class="section-title">Get in Touch</h1>

            <div class="contact-container">
                <!-- Info Section -->
                <div class="contact-info fade-in">
                    <h2 style="margin-bottom: 30px;">Contact Information</h2>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div>
                            <h3 style="margin-bottom: 5px;">Based in Kerala</h3>
                            <p style="color: var(--text-muted);">Serving across the state</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
                        <div>
                            <h3 style="margin-bottom: 5px;">Phone</h3>
                            <p style="color: var(--text-muted);">+91 98475 28357</p>
                        </div>
                    </div>

                    <div class="contact-item">
                        <div class="contact-icon"
                            style="color: var(--whatsapp-green); background: rgba(37, 211, 102, 0.1);"><i
                                class="fab fa-whatsapp"></i></div>
                        <div>
                            <h3 style="margin-bottom: 5px;">WhatsApp Support</h3>
                            <p style="color: var(--text-muted); margin-bottom: 10px;">Fastest way to reach us!</p>
                            <a href="https://wa.me/+919847528357" class="btn btn-whatsapp" target="_blank"
                                style="padding: 8px 16px; font-size: 0.9rem;">Message Us</a>
                        </div>
                    </div>
                </div>

                <!-- Form Section -->
                <div class="fade-in">
                    <form class="contact-form" action="#" method="POST"
                        onsubmit="event.preventDefault(); alert('Message feature available soon! Please prefer WhatsApp for now.');">
                        <h2 style="margin-bottom: 10px;">Send a Message</h2>

                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Your Phone Number Or Email</label>
                            <input type="tel" id="phone" class="form-control" placeholder="" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-control" placeholder="I am looking for..."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Send Enquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="whatsapp"></div>

    <div id="footer"></div>

    <script src="script.js"></script>
</body>

</html>
